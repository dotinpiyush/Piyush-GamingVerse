<!doctype html>
<!-- Ye main HTML file hai jisme React app mount hoti hai. -->
<html lang="en">
  <head>
    <!-- UTF-8 se browser modern text characters ko sahi read karta hai. -->
    <meta charset="UTF-8" />

    <!-- Viewport tag mobile responsive layout ke liye zaroori hai. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Ye description search engines aur browser previews ke liye hai. -->
    <meta
      name="description"
      content="A professional React gaming discovery website with auth, profiles, favorites, and RAWG game search."
    />

    <!-- Browser tab me ye title show hota hai. -->
    <title>Piyush GameVerse</title>
  </head>
  <body>
    <!-- React app isi root div ke andar render hoti hai. -->
    <div id="root"></div>

    <!-- Vite is module script se React entry file load karta hai. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
